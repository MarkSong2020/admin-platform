# ============================================================================
# E2E（登录闭环，真后端 + 真浏览器）。独立 workflow：nightly + 手动触发，
# **不挂在 PR 门上**（E2E 依赖整套后端栈、相对慢且易 flaky；按 codex PK 建议放
# 单独 job，避免阻塞主 PR 反馈）。frontend.yml 的 6 门仍是 PR 必过门。
# ⚠️ 首次真跑前未在 CI 验证过：后端 env（auth/CORS/pepper）若有缺项，首次 nightly
#    会暴露并据日志微调；因非 PR 门，不影响任何人的 PR 合入。
# ============================================================================

name: e2e (nightly)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 18 * * *" # 每日 ~02:00 Asia/Shanghai（UTC 18:00）

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.9.30"
  PYTHON_VERSION: "3.14"

jobs:
  e2e:
    name: MySQL browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_DATABASE_URL: mysql+asyncmy://app:app@localhost:3306/app
      APP_REDIS_URL: redis://localhost:6379/0
      MYSQL_ROOT_PASSWORD: root
      # 登录闭环必需：auth 开 + jwt secret（非空且足够长）+ refresh pepper（空则签发 refresh 失败）
      APP_AUTH_ENABLED: "true"
      APP_AUTH_JWT_SECRET: "ci-e2e-only-not-a-real-secret-0123456789abcdef0123456789abcdef"
      APP_AUTH_REFRESH_TOKEN_PEPPER: "ci-e2e-only-refresh-pepper-not-a-real-secret"
      # 开登录防护让验证码出现（与本地一致，smoke 断言验证码必现）
      APP_AUTH_LOGIN_GUARD_ENABLED: "true"
      # 前端 preview 跑在 4173，跨源调后端 8000 → CORS 放行该源
      APP_CORS_ALLOW_ORIGINS: '["http://localhost:4173"]'
      ADMIN_BOOTSTRAP_PASSWORD: "Admin@123456"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync backend deps
        run: uv sync --all-extras --dev --frozen

      - name: Configure MySQL collation
        run: |
          uv run python - <<'PY'
          import asyncio
          import os

          from sqlalchemy import text
          from sqlalchemy.engine import make_url
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main() -> None:
              url = make_url(os.environ["APP_DATABASE_URL"])
              database = url.database or "app"
              escaped_database = database.replace("`", "``")
              root_url = url.set(
                  username="root",
                  password=os.environ["MYSQL_ROOT_PASSWORD"],
              )
              engine = create_async_engine(root_url)
              async with engine.begin() as conn:
                  await conn.execute(text("SET GLOBAL log_bin_trust_function_creators = 1"))
                  await conn.execute(
                      text(
                          f"ALTER DATABASE `{escaped_database}` "
                          "CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_bin"
                      )
                  )
              await engine.dispose()

          asyncio.run(main())
          PY

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Sync frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: make migrate

      - name: Seed RBAC manifest
        run: uv run python -m admin_platform.cli rbac seed

      - name: Bootstrap super admin
        run: uv run python -m admin_platform.cli create-super-admin --username admin

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: http://localhost:8000
        run: pnpm build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start backend
        run: |
          uv run uvicorn admin_platform.main:app --host 127.0.0.1 --port 8000 \
            > /tmp/admin-platform-api.log 2>&1 &
          echo "$!" > /tmp/admin-platform-api.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/readyz; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/admin-platform-api.log
          exit 1

      - name: Browser E2E
        working-directory: frontend
        run: pnpm test:e2e
