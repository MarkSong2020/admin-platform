# ============================================================================
# 本文件是 GitHub Actions **参考资产**（可直接 fork 跑），不代表团队 CI 平台已定。
# 模板不指定真实 CI 平台 —— 业务团队按 ADR 决议自选（阿里云效 / Jenkins / GitLab CI 等）。
# Makefile 的 make check / audit / migrate / test-integration / check-db 在不同平台间完全 portable。
# 详见 docs/operations/CI_MIGRATION.md。
# ============================================================================

name: CI (reference only)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.9.30"
  PYTHON_VERSION: "3.14"

jobs:
  fast:
    name: fast lane (lint + type + unit + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Quality gate (ruff + pyright + pytest -m "not integration")
        run: make check

      # 无人值守地基（2026-06-05）：make check 是快车道（不含 coverage，保持
      # 本地快速反馈），coverage 门槛（pyproject fail_under=85）此前只在手动
      # make coverage 时通电 —— CI 与无人值守均不强制，agent 可写 0 覆盖的新
      # 代码而 fast lane 全绿。此 step 让门槛在 CI 通电。
      # ⚠️ 盲区：total coverage 会被高覆盖模块（schemas/models/config）掩盖
      # 低覆盖的 repository / auth service；它只防整体退化，不证明安全路径已测。
      # 关键路径（401/403/默认 deny/越权）靠负向测试守，不靠这条 total 门槛。
      - name: Coverage gate (fail_under per pyproject [tool.coverage.report])
        run: make coverage

      # v0.4.21: also run the `.pre-commit-config.yaml` hooks against the full
      # tree — `make check` covers ruff/pyright/pytest but not the standalone
      # pre-commit-hooks (check-yaml / check-toml / end-of-file-fixer /
      # trailing-whitespace / detect-private-key). Without this, hook config
      # drift goes silent in CI and only surfaces when a new joiner installs
      # the hook locally and gets confused by failed first commits.
      # v0.4.22: SKIP the frontend hooks here — this backend lane has no
      # pnpm/node, so `frontend-lint` (cd frontend && pnpm exec eslint) exits
      # 127 (command not found). The frontend lint/commitlint run in the
      # dedicated `frontend-gates` lane; running them on --all-files here only
      # broke the config-drift guard once the P6 frontend tree landed.
      - name: pre-commit hooks (config drift guard)
        run: SKIP=frontend-lint,frontend-commitlint uv run pre-commit run --all-files --show-diff-on-failure

      # v0.4.12: audit must BLOCK on known CVEs. Pre-v0.4.12 this step used
      # `continue-on-error: true` which silently masked vulnerabilities in
      # transitive deps — a textbook way for security regressions to land.
      # If a transient false positive blocks an urgent fix, add a targeted
      # `--ignore-vuln <PYSEC-XXXX>` in the Makefile with an inline TODO +
      # owner; never re-introduce `continue-on-error` here.
      - name: Dependency audit (blocking)
        run: make audit

      # v0.5.0+: reference path test — generator end-to-end smoke. unit tests
      # (test_new_module.py) cover the generator's *component* contracts but
      # not the *composition* failure modes. v0.5.0 self-review actually
      # surfaced 3 real bugs only via local `make smoke-generator`:
      #   - multi-patch alembic env.py triggered ruff I001 (commit 5657730)
      #   - env.py needed `# isort: skip_file` (commit 3209cfc)
      #   - `Enum.create(checkfirst=True)` failed under async DDL (76e2dda)
      # All shipped in v0.5.0 release before being caught. Running smoke in
      # CI on every PR closes that gap.
      #
      # smoke runs `make new-module` + `make check` + auto-cleanup; it does
      # NOT need MySQL / Redis (no DB ops in the generator path), so it
      # belongs in fast lane.
      - name: Generator end-to-end smoke
        run: make smoke-generator

  db:
    name: db lane (MySQL migrations + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DATABASE: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uapp -papp --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        # v0.4.12: provisioned so future idempotency-redis integration tests
        # (see tests/integration/test_idempotency_redis.py) can run without
        # extra setup. Baseline integration tests opt out of idempotency via
        # the autouse fixture in tests/integration/conftest.py, so this
        # service is currently only needed for the Redis-marked subset.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_DATABASE_URL: mysql+asyncmy://app:app@localhost:3306/app
      APP_REDIS_URL: redis://localhost:6379/0
      MYSQL_ROOT_PASSWORD: root
      APP_TEST_DB_ALLOW_DESTRUCTIVE: "1"
      # v0.4.20: redis_integration tests skip on Redis-unavailable by default
      # so local devs can run without docker; in CI we provisioned Redis above,
      # so skipping would silently hide failures. STRICT_REDIS_INTEGRATION=1
      # converts the skip into a hard fail.
      STRICT_REDIS_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Configure MySQL collation
        run: |
          uv run python - <<'PY'
          import asyncio
          import os

          from sqlalchemy import text
          from sqlalchemy.engine import make_url
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main() -> None:
              url = make_url(os.environ["APP_DATABASE_URL"])
              database = url.database or "app"
              escaped_database = database.replace("`", "``")
              root_url = url.set(
                  username="root",
                  password=os.environ["MYSQL_ROOT_PASSWORD"],
              )
              engine = create_async_engine(root_url)
              async with engine.begin() as conn:
                  await conn.execute(text("SET GLOBAL log_bin_trust_function_creators = 1"))
                  await conn.execute(
                      text(
                          f"ALTER DATABASE `{escaped_database}` "
                          "CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_bin"
                      )
                  )
              await engine.dispose()

          asyncio.run(main())
          PY

      - name: Apply migrations
        run: make migrate

      - name: Alembic drift check
        run: make check-db

      - name: Integration tests
        run: make test-integration
