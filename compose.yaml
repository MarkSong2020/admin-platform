name: admin-platform

# Local dev only. Production must run MySQL via managed RDS (or equivalent)
# with secrets injected from K8s/Vault, never docker-compose. The password
# variables read from the developer's .env or fall back to "app" — strictly
# fine for an isolated dev DB; an explicit env var is provided so a developer
# with stricter security policies can override without editing this file.

services:
  db:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_bin
      - --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
    ports:
      # 默认仅绑回环，不暴露到 0.0.0.0（防共享/公网开发机同网段访问 dev 库）。
      # 需远程访问时设 BIND_ADDR=0.0.0.0（或具体网卡 IP）覆盖。
      # 本机已有 MySQL 或 OrbStack 端口转发异常时，可用 MYSQL_HOST_PORT=13306 覆盖。
      - "${BIND_ADDR:-127.0.0.1}:${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent
      interval: 5s
      timeout: 5s
      retries: 10

  # Errata #5 — Redis is opt-in. Bring it up with: docker compose --profile cache up -d
  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      # 同 db：默认仅绑回环，BIND_ADDR 可覆盖。
      - "${BIND_ADDR:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
